<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOH Melbourne</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Metal+Mania&family=Montserrat:ital,wght@0,100..900;1,100..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Metal+Mania&family=Montserrat:ital,wght@0,100..900;1,100..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libertinus+Serif+Display&family=Lora:ital,wght@0,400..700;1,400..700&family=Metal+Mania&family=Montserrat:ital,wght@0,100..900;1,100..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
</head>

<body>
    <nav class="delivery-page-nav">
        <img class="delivery-page-nav-image" src="media/logo.png" alt="the logo of soh melbourne">
    </nav>

<main class="delivery-page-main">
    <div class="mobile-order-summary">
        <h2>Order summary</h2>
        <p>$<span class="delivery-order-summary-total">0</span></p>
    </div>

    <form action="confirmation.html" class="delivery-form">

        <p class="delivery-form-title">Contact</p>
        <input type="text" name="email" required placeholder="Email">

        <p class="delivery-form-title">Delivery</p>
        <div class="form-row">
            <input class="address" type="text" name="address" required placeholder="Address">
            <input class="postcode" type="text" name="postcode" required placeholder="Postcode">
        </div>
        <div class="form-row">
            <input type="text" name="fristname" required placeholder="First name">
            <input type="text" name="lastname" required placeholder="Last name">
        </div>

        <p class="delivery-form-title">Payment</p>
            <div class="form-payment-box">
                <h4 class="card">Credit card</h4>
            </div>
            <div class="form-payment-box-input">
                <input type="text" name="cardnumber" required placeholder="Card number">
                <div class="form-row">
                    <input type="text" name="expireddate" required placeholder="Expired date">
                    <input type="text" name="security number" required placeholder="Security code" >
                </div>
                <input type="text" name="name" required placeholder="Name on card">
            </div>

            <p class="delivery-form-title">Mobile number</p>
            <input type="text" name="mobilenumber" required placeholder="+61">
        
        <div class="delivery-page-button">
            <button class="payment-button" type="submit">Pay now</button>
        </div>
    </form>

    <div class="delivery-right">
        <div id="delivery-products">
        </div>

        <div class="total-section">

            <div class="subtotal-box">
                <h4 class="subtotal-box-text">Subtotal (<span class="total-quantity">0</span> items)</h4>
                <h4 class="subtotal-box-price">$<span class="delivery-subtotal-price">0</span></h4>
            </div>
            <div class="shipping-box">
                <h4 class="subtotal-shipping">Shipping</h4>
                <h4 class="subtotal-shipping-price">$<span class="total-shipping">0</span></h4>
            </div>
            <div class="total-price-box">
                <h2 class="delivery-page-total">Total</h2>
                <h2 class="delivery-page-total-price">$<span class="delivery-page-total-price-number">0</span></h2>
            </div>

        </div>
    </div>
</main>
</body>
